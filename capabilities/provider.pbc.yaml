      "id": "provider:pbc/artifact.compose.product_contract@1",
      "reason": "Deferred because the existing /v1/pbc/* JSON routes expose workflow projections and evidence-derived artifacts, but no route composes and returns a standalone product_contract artifact. Binding it to GET /v1/pbc/tasks/:taskId would change the caller-visible contract."
    },
