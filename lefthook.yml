# Git hooks configuration
# Materialize local hooks: just install
# Minimal bootstrap: bun install && bun run install:hooks
# The install recipe sets core.hooksPath=.githooks, whose committed wrappers invoke
# the workspace-local lefthook binary and fail loud if dependencies are missing.
# Docs: https://github.com/evilmartians/lefthook

pre-commit:
  parallel: false
  commands:
    gitleaks:
      run: gitleaks protect --staged --redact
    dependency-freshness:
      run: just check-deps
    suppressions:
      run: bun scripts/check-suppressions.ts
    lint:
      run: bun run lint
      stage_fixed: true
    boundaries:
      run: bun scripts/check-boundaries.ts
    manifests:
      run: bun scripts/check-manifest-edges.ts
    cli-surface:
      run: bun scripts/check-cli-surface.ts
    public-surface:
      run: bun scripts/check-public-surface.ts
    enablement-changelog:
      run: bun scripts/check-enablement-changelog.ts
    typecheck:
      run: bun run build && bun run typecheck

pre-push:
  parallel: false
  commands:
    install:
      run: bun install
    test:
      run: ASP_PROJECT=agent-control-plane bun run test:fast
